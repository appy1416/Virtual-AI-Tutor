version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${PROD_DB_USER:-edutwin_prod}
      POSTGRES_PASSWORD: ${PROD_DB_PASSWORD}
      POSTGRES_DB: edutwin_prod
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${PROD_DB_USER:-edutwin_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${DOCKER_USERNAME}/edutwin-backend:latest
    build: ./backend
    environment:
      DATABASE_URL: postgresql://${PROD_DB_USER:-edutwin_prod}:${PROD_DB_PASSWORD}@postgres:5432/edutwin_prod
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: ${DOCKER_USERNAME}/edutwin-frontend:latest
    build: ./frontend
    environment:
      VITE_API_BASE_URL: https://api.edutwin.ai/api/v1
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - backend

  celery_worker:
    image: ${DOCKER_USERNAME}/edutwin-backend:latest
    build: ./backend
    environment:
      DATABASE_URL: postgresql://${PROD_DB_USER:-edutwin_prod}:${PROD_DB_PASSWORD}@postgres:5432/edutwin_prod
      REDIS_URL: redis://redis:6379/0
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - postgres
      - redis
    command: celery -A app.tasks.celery_app worker -l info

volumes:
  postgres_prod_data:
