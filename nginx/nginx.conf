upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3000;
}

# Gzip Compression
gzip on;
gzip_types text/plain text/css text/javascript application/json application/javascript text/xml application/xml;
gzip_vary on;
gzip_min_length 1000;

server {
    listen 80;
    server_name api.edutwin.ai edutwin.ai www.edutwin.ai;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name api.edutwin.ai;

    ssl_certificate /etc/letsencrypt/live/api.edutwin.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.edutwin.ai/privkey.pem;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # API routes
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket for chat
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Docs
    location /docs {
        proxy_pass http://backend;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name edutwin.ai www.edutwin.ai;

    ssl_certificate /etc/letsencrypt/live/edutwin.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edutwin.ai/privkey.pem;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Frontend
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_cache_valid 200 30d;
        proxy_pass http://frontend;
        expires 30d;
    }
}
